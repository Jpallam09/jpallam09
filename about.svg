<svg width="800" height="320" viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
      * { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="800" height="320" fill="#09090b"/>

  <!-- Title bar -->
  <rect width="800" height="38" fill="#111113"/>
  <line x1="0" y1="38" x2="800" y2="38" stroke="#27272a" stroke-width="1"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="19" r="5.5" fill="#ef4444"/>
  <circle cx="38" cy="19" r="5.5" fill="#eab308"/>
  <circle cx="56" cy="19" r="5.5" fill="#22c55e"/>

  <!-- Tab -->
  <rect x="80" y="6" width="110" height="26" rx="3" fill="#09090b"/>
  <line x1="80" y1="38" x2="190" y2="38" stroke="#09090b" stroke-width="1"/>
  <text x="95" y="24" fill="#a1a1aa" font-size="12">about.ts</text>
  <circle cx="178" cy="19" r="3" fill="#52525b"/>

  <!-- Tab inactive -->
  <text x="205" y="24" fill="#3f3f46" font-size="12">index.ts</text>

  <!-- Sidebar line numbers area -->
  <rect x="0" y="38" width="44" height="282" fill="#0d0d0f"/>
  <line x1="44" y1="38" x2="44" y2="320" stroke="#1c1c1f" stroke-width="1"/>

  <!-- Active line highlight -->
  <rect x="44" y="96" width="756" height="20" fill="#1c1c1f"/>

  <!-- Line numbers -->
  <text x="12" y="74"  fill="#3f3f46" font-size="12">1</text>
  <text x="12" y="94"  fill="#3f3f46" font-size="12">2</text>
  <text x="12" y="114" fill="#52525b" font-size="12">3</text>
  <text x="12" y="134" fill="#3f3f46" font-size="12">4</text>
  <text x="12" y="154" fill="#3f3f46" font-size="12">5</text>
  <text x="12" y="174" fill="#3f3f46" font-size="12">6</text>
  <text x="12" y="194" fill="#3f3f46" font-size="12">7</text>
  <text x="12" y="214" fill="#3f3f46" font-size="12">8</text>
  <text x="12" y="234" fill="#3f3f46" font-size="12">9</text>
  <text x="12" y="254" fill="#3f3f46" font-size="12">10</text>
  <text x="6"  y="274" fill="#3f3f46" font-size="12">11</text>
  <text x="6"  y="294" fill="#3f3f46" font-size="12">12</text>

  <!-- Cursor bar on active line -->
  <rect x="59" y="99" width="2" height="14" fill="#fafafa" opacity="0.9"/>

  <!-- Code content -->
  <!-- line 1: blank -->

  <!-- line 2: ❯ cat about.ts -->
  <text x="60" y="91" font-size="13">
    <tspan fill="#22c55e">❯ </tspan>
    <tspan fill="#52525b">cat about.ts</tspan>
  </text>

  <!-- line 3: const jp = { -->
  <text x="60" y="111" font-size="13">
    <tspan fill="#a78bfa">const </tspan>
    <tspan fill="#60a5fa">jp</tspan>
    <tspan fill="#fafafa"> = </tspan>
    <tspan fill="#fafafa">{</tspan>
  </text>

  <!-- line 4: focus -->
  <text x="60" y="131" font-size="13">
    <tspan fill="#3f3f46">  </tspan>
    <tspan fill="#fafafa">focus</tspan>
    <tspan fill="#52525b">:    </tspan>
    <tspan fill="#86efac">"Full-Stack Web Development"</tspan>
    <tspan fill="#52525b">,</tspan>
  </text>

  <!-- line 5: stack -->
  <text x="60" y="151" font-size="13">
    <tspan fill="#fafafa">  stack</tspan>
    <tspan fill="#52525b">:    </tspan>
    <tspan fill="#52525b">[</tspan>
    <tspan fill="#86efac">"MERN"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"Laravel"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"PHP"</tspan>
    <tspan fill="#52525b">],</tspan>
  </text>

  <!-- line 6: learning -->
  <text x="60" y="171" font-size="13">
    <tspan fill="#fafafa">  learning</tspan>
    <tspan fill="#52525b">: </tspan>
    <tspan fill="#52525b">[</tspan>
    <tspan fill="#86efac">"TypeScript"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"JavaScript"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"React"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"Next.js"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"Cloud"</tspan>
    <tspan fill="#52525b">],</tspan>
  </text>

  <!-- line 7: likes -->
  <text x="60" y="191" font-size="13">
    <tspan fill="#fafafa">  likes</tspan>
    <tspan fill="#52525b">:    </tspan>
    <tspan fill="#52525b">[</tspan>
    <tspan fill="#86efac">"REST APIs"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"auth flows"</tspan>
    <tspan fill="#52525b">, </tspan>
    <tspan fill="#86efac">"db design"</tspan>
    <tspan fill="#52525b">],</tspan>
  </text>

  <!-- line 8: fuel -->
  <text x="60" y="211" font-size="13">
    <tspan fill="#fafafa">  fuel</tspan>
    <tspan fill="#52525b">:     </tspan>
    <tspan fill="#86efac">"coffee "</tspan>
    <tspan fill="#52525b">,</tspan>
  </text>

  <!-- line 9: status -->
  <text x="60" y="231" font-size="13">
    <tspan fill="#fafafa">  status</tspan>
    <tspan fill="#52525b">:   </tspan>
    <tspan fill="#86efac">"open to opportunities "</tspan>
    <tspan fill="#52525b">,</tspan>
  </text>

  <!-- line 10: closing brace -->
  <text x="60" y="251" fill="#fafafa" font-size="13">}</text>

  <!-- Status bar -->
  <rect x="0" y="300" width="100%" height="20" fill="#111113"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#27272a" stroke-width="1"/>
  <text x="60" y="314" fill="#3f3f46" font-size="11">TypeScript</text>
  <text x="680" y="314" fill="#3f3f46" font-size="11">Ln 3, Col 1</text>
  <text x="740" y="314" fill="#3f3f46" font-size="11">UTF-8</text>

  <!-- Bottom border -->
  <line x1="0" y1="319" x2="800" y2="319" stroke="#27272a" stroke-width="1"/>
</svg>
